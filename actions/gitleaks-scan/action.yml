name: Gitleaks scan
description: >
  Run gitleaks against the repo. Sets FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 so
  the action keeps working through the Node 20 → Node 24 transition.

inputs:
  github-token:
    description: GitHub token for posting PR scan summary
    required: true
  enable-comments:
    description: Allow gitleaks-action to post a PR comment
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout (full history for gitleaks)
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        GITLEAKS_ENABLE_COMMENTS: ${{ inputs.enable-comments }}
