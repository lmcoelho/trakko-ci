name: _build-image (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Short image name (e.g. "vigilos-api")
        type: string
        required: true
      registry-owner:
        description: GHCR owner segment (defaults to repo owner)
        type: string
        default: ""
      context:
        type: string
        default: "."
      dockerfile:
        type: string
        default: "Dockerfile"
      build-args:
        description: Multiline build args (KEY=VALUE per line)
        type: string
        default: ""
      platforms:
        type: string
        default: "linux/amd64"
      push-latest:
        description: Push :latest tag (only on default branch)
        type: boolean
        default: true
    outputs:
      image-tag:
        description: Short SHA tag of the built image (sha-abcdefg)
        value: ${{ jobs.build.outputs.tag }}
      image-ref:
        description: Full image ref including registry/owner
        value: ${{ jobs.build.outputs.ref }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build & push (${{ inputs.image-name }})
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.shortsha.outputs.tag }}
      ref: ${{ steps.refs.outputs.image-ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Compute short SHA
        id: shortsha
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve image ref
        id: refs
        env:
          OWNER: ${{ inputs.registry-owner != '' && inputs.registry-owner || github.repository_owner }}
          NAME: ${{ inputs.image-name }}
        run: |
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "image-ref=ghcr.io/${OWNER_LC}/${NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ steps.refs.outputs.image-ref }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ inputs.push-latest && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha,scope=${{ inputs.image-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}

      - uses: lmcoelho/trakko-ci/actions/step-summary@v1
        with:
          job-name: build-image
          details: |
            - Image: `${{ steps.refs.outputs.image-ref }}:${{ steps.shortsha.outputs.tag }}`
