name: _test-node (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: true
      working-directory:
        type: string
        default: "."
      install-command:
        type: string
        default: "npm ci"
      build-command:
        description: Build step before tests; empty disables
        type: string
        default: ""
      test-command:
        type: string
        default: "npm test"
      typecheck-command:
        description: Type-check step; empty disables
        type: string
        default: ""
      timeout-minutes:
        type: number
        default: 15

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node ${{ inputs.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Type-check
        if: ${{ inputs.typecheck-command != '' }}
        run: ${{ inputs.typecheck-command }}

      - name: Test
        run: ${{ inputs.test-command }}

      - uses: lmcoelho/trakko-ci/actions/step-summary@v1
        with:
          job-name: test-node
          details: |
            - Node: ${{ inputs.node-version }}
